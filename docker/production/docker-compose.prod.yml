version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    container_name: finance-analyser-app-prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage
      - supervisor_logs:/var/log/supervisor
      - php_logs:/var/log/php
    networks:
      - finance-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_LOG_LEVEL=warning
      - DB_HOST=mysql
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  nginx:
    image: nginx:alpine
    container_name: finance-analyser-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_storage:/var/www/html/storage:ro
      - ./docker/production/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - finance-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  mysql:
    image: mysql:8.0
    container_name: finance-analyser-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: finance_analyser
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - mysql_logs:/var/log/mysql
    networks:
      - finance-network
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.75'

  redis:
    image: redis:7-alpine
    container_name: finance-analyser-redis-prod
    restart: always
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_logs:/var/log/redis
    networks:
      - finance-network
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  supervisor:
    build:
      context: ./docker/supervisor
      dockerfile: Dockerfile
    container_name: finance-analyser-supervisor-prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage
      - supervisor_logs:/var/log/supervisor
    networks:
      - finance-network
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "supervisorctl", "-c", "/etc/supervisor/conf.d/supervisord.conf", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.5'

  horizon:
    build:
      context: ./docker/horizon
      dockerfile: Dockerfile
    container_name: finance-analyser-horizon-prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage
      - horizon_logs:/var/log/horizon
    networks:
      - finance-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "supervisorctl", "-c", "/etc/supervisor/conf.d/horizon.conf", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.5'

  # Monitoring and logging
  logrotate:
    image: alpine:latest
    container_name: finance-analyser-logrotate
    restart: "no"
    volumes:
      - app_storage:/var/www/html/storage:ro
      - supervisor_logs:/var/log/supervisor:ro
      - horizon_logs:/var/log/horizon:ro
      - nginx_logs:/var/log/nginx:ro
      - ./docker/logrotate:/etc/logrotate:ro
    command: |
      sh -c "
        apk add --no-cache logrotate &&
        echo '0 2 * * * /usr/sbin/logrotate /etc/logrotate/logrotate.conf' > /etc/crontabs/root &&
        crond -f -l 2
      "
    networks:
      - finance-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  supervisor_logs:
    driver: local
  horizon_logs:
    driver: local
  nginx_logs:
    driver: local
  php_logs:
    driver: local
  mysql_logs:
    driver: local
  redis_logs:
    driver: local

networks:
  finance-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
