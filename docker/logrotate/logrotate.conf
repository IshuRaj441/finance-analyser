/var/www/html/storage/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 www-data www-data
    postrotate
        # Reload PHP-FPM to ensure logs are properly handled
        kill -USR1 1 2>/dev/null || true
    endscript
}

