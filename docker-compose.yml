
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-analyser-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - finance-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: finance-analyser-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - finance-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: finance-analyser-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: finance_analyser
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: finance_user
      MYSQL_HEALTH_CHECK: 1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - finance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: finance-analyser-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - finance-network
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  supervisor:
    build:
      context: ./docker/supervisor
      dockerfile: Dockerfile
    container_name: finance-analyser-supervisor
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - supervisor_logs:/var/log/supervisor
    networks:
      - finance-network
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "supervisorctl", "-c", "/etc/supervisor/conf.d/supervisord.conf", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  horizon:
    build:
      context: ./docker/horizon
      dockerfile: Dockerfile
    container_name: finance-analyser-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - horizon_logs:/var/log/horizon
    networks:
      - finance-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "supervisorctl", "-c", "/etc/supervisor/conf.d/horizon.conf", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  socket-server:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    container_name: finance-analyser-socket-server
    restart: "no"
    ports:
      - "3001:3001"
    networks:
      - finance-network
    depends_on:
      - redis
      - mysql
    environment:
      - NODE_ENV=development

  
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  supervisor_logs:
    driver: local
  horizon_logs:
    driver: local
  node_modules:
    driver: local

networks:
  finance-network:
    driver: bridge
